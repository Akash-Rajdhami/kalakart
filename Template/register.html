{% extends 'base.html' %}

{% load static %}

{% block content %}

<section class="register-section">

    <div class="container">

        <div class="row justify-content-center align-items-center">

            <div class="col-lg-6 col-md-8">

                <div class="register-card">

                    <h2 class="register-title text-center">
                        Create Your Account
                    </h2>

                    <p class="register-subtitle text-center">
                        Join KalaKart as a Customer or Seller.
                    </p>

                    <form>

                        <div class="mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                placeholder="Enter your full name"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Email Address
                            </label>

                            <input
                                type="email"
                                class="form-control"
                                placeholder="Enter your email"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                placeholder="Choose a username"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <div class="password-box">

                                <input
                                    type="password"
                                    class="form-control"
                                    id="registerPassword"
                                    placeholder="Create a password"
                                    required
                                >

                                <i
                                    class="bi bi-eye password-toggle"
                                    onclick="togglePassword('registerPassword', this)"
                                ></i>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Confirm Password
                            </label>

                            <div class="password-box">

                                <input
                                    type="password"
                                    class="form-control"
                                    id="confirmPassword"
                                    placeholder="Confirm your password"
                                    required
                                >

                                <i
                                    class="bi bi-eye password-toggle"
                                    onclick="togglePassword('confirmPassword', this)"
                                ></i>

                            </div>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Register As
                            </label>

                            <select class="form-select" required>

                                <option selected disabled>
                                    Select Account Type
                                </option>

                                <option>
                                    Customer
                                </option>

                                <option>
                                    Seller
                                </option>

                            </select>

                        </div>

                        <button
                            type="submit"
                            class="register-btn w-100"
                        >
                            Create Account
                        </button>

                    </form>

                    <p class="login-link text-center mt-4">

                        Already have an account?

                        <a href="{% url 'login' %}">
                            Login
                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}

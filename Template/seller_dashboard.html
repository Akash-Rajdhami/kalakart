{% extends 'base.html' %}

{% block content %}

<section class="container py-5">

    <h2 class="mb-4">
        Seller Dashboard
    </h2>

    <div class="card shadow-sm p-4">

        <h4>
            Welcome, {{ request.user.first_name }}
        </h4>

        <p>
            Manage your products and orders from here.
        </p>

    </div>

    <div class="row mt-4">

        <div class="col-md-3">

            <div class="card text-center shadow-sm p-3">

                <h5>Total Products</h5>

                <h2>0</h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-center shadow-sm p-3">

                <h5>Total Orders</h5>

                <h2>0</h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-center shadow-sm p-3">

                <h5>Revenue</h5>

                <h2>Rs. 0</h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-center shadow-sm p-3">

                <h5>Pending Orders</h5>

                <h2>0</h2>

            </div>

        </div>

    </div>

    <div class="mt-5">

        <a href="#" class="btn btn-warning">
            Add Product
        </a>

        <a href="#" class="btn btn-dark">
            Manage Products
        </a>

    </div>

</section>

{% endblock %}

{% extends 'base.html' %}

{% load static %}

{% block content %}

<section class="login-section">

    <div class="container">

        <div class="row justify-content-center align-items-center">

            <div class="col-lg-5 col-md-7">

                <div class="login-card">

                    <h2 class="login-title text-center">
                        Welcome Back
                    </h2>

                    <p class="login-subtitle text-center">
                        Login to your KalaKart account.
                    </p>

                    <form>

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                placeholder="Enter your username"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <div class="password-box">

                                <input
                                    type="password"
                                    class="form-control"
                                    id="loginPassword"
                                    placeholder="Enter your password"
                                    required
                                >

                                <i
                                    class="bi bi-eye password-toggle"
                                    onclick="togglePassword('loginPassword', this)"
                                ></i>

                            </div>

                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">

                            <div class="form-check">

                                <input
                                    class="form-check-input"
                                    type="checkbox"
                                    id="rememberMe"
                                >

                                <label
                                    class="form-check-label"
                                    for="rememberMe"
                                >
                                    Remember Me
                                </label>

                            </div>

                            <a href="#" class="forgot-password">
                                Forgot Password?
                            </a>

                        </div>

                        <button
                            type="submit"
                            class="login-btn w-100"
                        >
                            Login
                        </button>

                    </form>

                    <p class="register-link text-center mt-4">

                        Don't have an account?

                        <a href="{% url 'register' %}">
                            Register
                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}

{% load static %}

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>KalaKart</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg shadow-sm">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
          <img src="{% static 'images/logo.png' %}" alt="logo" height="45" />

          <span class="logo-text ms-2"> KalaKart </span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarContent"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
          <ul class="navbar-nav mx-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/shop/">Shop</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/about/">About</a>
            </li>
          </ul>

          <div class="d-flex align-items-center gap-2 ms-4 right-nav">
            <form class="d-flex">
              <input class="form-control" type="search" placeholder="Search" />

              <button class="btn btn-search ms-2">Search</button>
            </form>

            <a href="#" class="btn btn-login"> Login </a>

            <a href="#" class="btn btn-register"> Register </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Navbar End -->

    <div class="container mt-5">{% block content %} {% endblock %}</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>KalaKart</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body>
    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg shadow-sm">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
          <img src="{% static 'images/logo.png' %}" alt="Logo" height="45" />

          <span class="logo-text ms-2"> KalaKart </span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarContent"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
          <ul class="navbar-nav mx-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/shop/">Shop</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/about/">About</a>
            </li>
          </ul>

          <div class="d-flex align-items-center gap-2">
            <form class="d-flex align-items-center">
              <input class="form-control" type="search" placeholder="Search" />

              <button class="btn btn-search ms-2" type="submit">Search</button>
            </form>
            <a href="#" class="btn btn-cart position-relative">
              <i class="bi bi-cart3"></i>

              <span class="cart-count"> 0 </span>
            </a>

            {% if user.is_authenticated %}

            <span class="me-2 fw-semibold">
              Welcome, {{ user.first_name }}
            </span>

            <a href="{% url 'logout' %}" class="btn btn-danger"> Logout </a>

            {% else %}

            <a href="{% url 'login' %}" class="btn btn-login"> Login </a>

            <a href="{% url 'register' %}" class="btn btn-register">
              Register
            </a>

            {% endif %}
          </div>
        </div>
      </div>
    </nav>
    {% if messages %}

    <div class="container mt-3">
      {% for message in messages %}

      <div class="alert alert-{{ message.tags }}">{{ message }}</div>

      {% endfor %}
    </div>

    {% endif %}

    <!-- Page Content -->

    <div class="container mt-5">{% block content %} {% endblock %}</div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);

        const icon = button.querySelector("i");

        if (input.type === "password") {
          input.type = "text";

          icon.classList.remove("bi-eye");

          icon.classList.add("bi-eye-slash");
        } else {
          input.type = "password";

          icon.classList.remove("bi-eye-slash");

          icon.classList.add("bi-eye");
        }
      }
    </script>
  </body>
</html>
